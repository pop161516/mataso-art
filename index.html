<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Portfolio - Dynamic Room Systems</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #111;
        font-family: sans-serif;
      }
      #blocker {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
        cursor: pointer;
        user-select: none;
        z-index: 10;
        text-align: center;
      }
      #debug-log {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: rgba(0,0,0,0.8);
        color: #00ff00;
        font-family: monospace;
        font-size: 12px;
        padding: 10px;
        border-radius: 5px;
        max-width: 400px;
        pointer-events: none;
        z-index: 100;
      }
    </style>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.160.0",
          "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="blocker">
      <div style="font-size: 32px; margin-bottom: 10px;">✨ Core Architecture Multi-Room System ✨</div>
      <div>Walk into rooms to see them trigger dynamically.</div>
      <div style="font-size: 14px; margin-top: 15px; color: #aaa;">Controls: WASD | Mouse</div>
    </div>

    <div id="debug-log">System Status: Booting Room Managers...</div>

    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
      import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

      const debugEl = document.getElementById('debug-log');
      function log(msg, isError = false) {
          console.log(msg);
          const time = new Date().toLocaleTimeString();
          debugEl.innerHTML += `<br><span style="color:${isError ? '#ff4444' : '#00ff00'}">[${time}] ${msg}</span>`;
      }

      log("Systems Initialized.");

      // 1. Core Setup
      const scene = new THREE.Scene();
      const bgColor = 0x1a2634;
      scene.background = new THREE.Color(bgColor);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 1.6, 5);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 10, 7.5);
      scene.add(dirLight);

      // 2. Room Management State Object
      const RoomManager = {
        art: {
          meshes: [],             // All objects matching art_****
          collidables: [],         // Collidables inside this specific room
          triggerMesh: null,       // The ArtTrigger bounding box object
          triggerBox3: null,       // The mathematical volume box
          isActive: false          // Current state tracking toggles
        }
        // Future extensions can be added easily here:
        // video: { meshes: [], collidables: [], triggerMesh: null, triggerBox3: null, isActive: false }
      };

      const baseCollidableObjects = []; // Static boundaries that are ALWAYS active (e.g. SmallWalls)

      // Loaders
      const loader = new GLTFLoader();
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
      loader.setDRACOLoader(dracoLoader);

      // Materials Configurations
      const visibleGreyMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.2, roughness: 0.8 });
      const transparentInvisibleMaterial = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.0 });
      
      // FIX: Defining the missing material variable so it doesn't crash!
      const visibleBoundaryMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xff0000, 
        transparent: true, 
        opacity: 0.3 // Translucent red so you can see your boundary walls while debugging
      });

      // Transparent Green for Triggers
      const triggerGreenMaterial = new THREE.MeshBasicMaterial({ 
        color: 0x00ff00, 
        transparent: true, 
        opacity: 0.2, 
        wireframe: false 
      });

      // Asset Manifest Array
      // Notice "art_room" updated below based on your configuration requirement
      const modelsToLoad = [
        { name: 'Hexagon', path: 'https://raw.githack.com/pop161516/mataso-art/main/Modles/Hexagon.glb' },
        { name: 'ArtRoomFull', path: 'https://raw.githack.com/pop161516/mataso-art/main/Modles/ArtRoomFull.glb' },
        { name: 'SmallWalls', path: 'https://raw.githack.com/pop161516/mataso-art/main/Modles/SmallWallsNew.glb' }
      ];

      // 3. Robust Name Filtering and Asset Injector Loop
      modelsToLoad.forEach((modelInfo) => {
        loader.load(
          modelInfo.path,
          function (gltf) {
            scene.add(gltf.scene);
            log(`📦 Model File Loaded: ${modelInfo.name}`);

            gltf.scene.traverse((child) => {
              if (child.isMesh) {
                
                // --- A. CRITICAL FIX: Target anything containing 'Trigger' ---
                if (child.name.toLowerCase().includes('trigger')) {
                  child.material = triggerGreenMaterial;
                  
                  // Compute mathematical bounding parameters
                  child.geometry.computeBoundingBox();
                  
                  RoomManager.art.triggerMesh = child;
                  RoomManager.art.triggerBox3 = new THREE.Box3();
                  log(`🎯 Success: Found & bound Trigger volume from mesh: "${child.name}"`);
                  return; 
                }

                // --- B. Handle Dynamic Room Collections (Prefix art_) ---
                if (modelInfo.name.startsWith('art_')) {
                  // Keep it visible for now so you can see where to walk
                  child.visible = true; 
                  RoomManager.art.meshes.push(child);
                  
                  // If it's a solid part of the art room (like your plinth), track it!
                  if (!child.name.toLowerCase().includes('floor')) {
                    child.material = visibleGreyMaterial;
                    RoomManager.art.collidables.push(child);
                    log(`🧱 Added room collider object: "${child.name}"`);
                  } else {
                    child.material = visibleGreyMaterial; 
                  }
                  return;
                }

                // --- C. CRITICAL FIX: Target anything from the SmallWalls file ---
                if (modelInfo.name === 'SmallWalls') {
                  child.material = visibleBoundaryMaterial; // Keep translucent red for debugging
                  baseCollidableObjects.push(child); 
                  log(`🚧 SUCCESS: Wall collider tracked safely from: "${child.name}"`);
                }
                
                // --- D. Handle Lobby Floor ---
                if (modelInfo.name === 'Hexagon') {
                  child.material = visibleGreyMaterial;
                }
              }
            });
          },
          undefined,
          function (error) { console.error(error); }
        );
      });

      // 4. Input & Controls System
      const controls = new PointerLockControls(camera, document.body);
      const blocker = document.getElementById('blocker');
      blocker.addEventListener('click', () => controls.lock());
      controls.addEventListener('lock', () => blocker.style.display = 'none');
      controls.addEventListener('unlock', () => blocker.style.display = 'flex');
      scene.add(controls.getObject());

      const keyboard = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
      document.addEventListener('keydown', (e) => { if (keyboard[e.code] !== undefined) keyboard[e.code] = true; });
      document.addEventListener('keyup', (e) => { if (keyboard[e.code] !== undefined) keyboard[e.code] = false; });

      const velocity = new THREE.Vector3();
      const direction = new THREE.Vector3();
      const clock = new THREE.Clock();
      const moveSpeed = 40.0;
      const raycaster = new THREE.Raycaster();

      // 5. Physics and Runtime Animation Processing
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (controls.isLocked === true) {
          velocity.x -= velocity.x * 10.0 * delta;
          velocity.z -= velocity.z * 10.0 * delta;

          direction.z = Number(keyboard.KeyS) - Number(keyboard.KeyW); 
          direction.x = Number(keyboard.KeyD) - Number(keyboard.KeyA);
          direction.normalize(); 

          if (keyboard.KeyW || keyboard.KeyS) velocity.z += direction.z * moveSpeed * delta;
          if (keyboard.KeyA || keyboard.KeyD) velocity.x += direction.x * moveSpeed * delta;

          const controlObject = controls.getObject();
          controlObject.position.y = 1.0; 

          // -------------------------------------------------------------
          // STEP 1: DYNAMIC ROOM TRIGGER LOGIC (VOLUME OVERLAP CHECK)
          // -------------------------------------------------------------
          if (RoomManager.art.triggerMesh && RoomManager.art.triggerBox3) {
            // Synchronize moving transformations from Blender relative spacing matrix
            RoomManager.art.triggerBox3.copy(RoomManager.art.triggerMesh.geometry.boundingBox)
                                       .applyMatrix4(RoomManager.art.triggerMesh.matrixWorld);

            // Is the camera's current point coordinates enclosed inside the box volume dimensions?
            const isInsideArt = RoomManager.art.triggerBox3.containsPoint(controlObject.position);

            if (isInsideArt && !RoomManager.art.isActive) {
              // PLAYER JUST ENTERED THE ART ROOM
              RoomManager.art.isActive = true;
              RoomManager.art.meshes.forEach(m => m.visible = true);
              log("✨ ENTERED: Art Room activated.");
            } else if (!isInsideArt && RoomManager.art.isActive) {
              // PLAYER LEFT THE ART ROOM
              RoomManager.art.isActive = false;
              RoomManager.art.meshes.forEach(m => m.visible = false);
              log("🌑 EXITED: Art Room deactivated.");
            }
          }

          // -------------------------------------------------------------
          // STEP 2: CONTEXTUAL COLLISIONS ASSEMBLY
          // Combine permanent walls with current active dynamic room collision profiles
          // -------------------------------------------------------------
          let activeCollidables = [...baseCollidableObjects];
          if (RoomManager.art.isActive) {
            activeCollidables = activeCollidables.concat(RoomManager.art.collidables);
          }

          let canMoveZ = true;
          let canMoveX = true;
          let canMoveDiagonal = true;

          if (activeCollidables.length > 0) {
            const cameraDirection = new THREE.Vector3();
            controlObject.getWorldDirection(cameraDirection);
            cameraDirection.y = 0;
            cameraDirection.normalize();

            const cameraRight = new THREE.Vector3();
            cameraRight.crossVectors(cameraDirection, controlObject.up).normalize().negate();

            const rayOrigin = controlObject.position.clone();
            rayOrigin.y = 0.5;

            // Z Axis
            if (velocity.z !== 0) {
              const rayDirZ = cameraDirection.clone().multiplyScalar(velocity.z < 0 ? 1 : -1);
              raycaster.set(rayOrigin, rayDirZ);
              raycaster.far = Math.abs(velocity.z * delta) + 1.2;
              const intersectionsZ = raycaster.intersectObjects(activeCollidables, true);
              if (intersectionsZ.length > 0) { canMoveZ = false; velocity.z = 0; }
            }

            // X Axis
            if (velocity.x !== 0) {
              const rayDirX = cameraRight.clone().multiplyScalar(velocity.x > 0 ? 1 : -1);
              raycaster.set(rayOrigin, rayDirX);
              raycaster.far = Math.abs(velocity.x * delta) + 1.2;
              const intersectionsX = raycaster.intersectObjects(activeCollidables, true);
              if (intersectionsX.length > 0) { canMoveX = false; velocity.x = 0; }
            }

            // Diagonal Slide Guard
            if ((velocity.x !== 0 || velocity.z !== 0) && (canMoveX && canMoveZ)) {
              const combinedHeading = new THREE.Vector3();
              const fwdVector = cameraDirection.clone().multiplyScalar(-velocity.z * delta);
              const sideVector = cameraRight.clone().multiplyScalar(velocity.x * delta);
              combinedHeading.addVectors(fwdVector, sideVector);
              const totalDistance = combinedHeading.length();
              combinedHeading.normalize();

              raycaster.set(rayOrigin, combinedHeading);
              raycaster.far = totalDistance + 1.2;
              const intersectionsDiagonal = raycaster.intersectObjects(activeCollidables, true);
              if (intersectionsDiagonal.length > 0) {
                canMoveDiagonal = false;
                velocity.x = 0;
                velocity.z = 0;
              }
            }
          }

          if (canMoveX && canMoveDiagonal) controls.moveRight(velocity.x * delta);
          if (canMoveZ && canMoveDiagonal) controls.moveForward(-velocity.z * delta); 
        }

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
