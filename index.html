<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Portfolio - Collision Debug</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #111;
        font-family: sans-serif;
      }
      #blocker {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
        cursor: pointer;
        user-select: none;
        z-index: 10;
        text-align: center;
      }
      #debug-log {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: rgba(0,0,0,0.8);
        color: #00ff00;
        font-family: monospace;
        font-size: 12px;
        padding: 10px;
        border-radius: 5px;
        max-width: 400px;
        pointer-events: none;
        z-index: 100;
      }
    </style>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.160.0",
          "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="blocker">
      <div style="font-size: 32px; margin-bottom: 10px;">🚧 Debug Mode Enabled 🚧</div>
      <div>Visible Hitboxes and Colors Active.</div>
      <div style="font-size: 14px; margin-top: 15px; color: #aaa;">Controls: WASD | Mouse</div>
      <div style="margin-top: 10px; font-weight: bold; color: yellow; border: 2px solid yellow; padding: 5px">CLICK ANYWHERE HERE TO START</div>
    </div>

    <div id="debug-log">System Status: Booting...</div>

    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
      import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

      const debugEl = document.getElementById('debug-log');
      function log(msg, isError = false) {
          console.log(msg);
          const time = new Date().toLocaleTimeString();
          debugEl.innerHTML += `<br><span style="color:${isError ? '#ff4444' : '#00ff00'}">[${time}] ${msg}</span>`;
      }

      log("Three.js libraries imported successfully.");

      // 1. Core Setup
      const scene = new THREE.Scene();
      const bgColor = 0x1a2634; // Saved to match background color later
      scene.background = new THREE.Color(bgColor);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 1.6, 5); // Start position

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      log("Canvas renderer attached to DOM.");

      // 2. Add a Reference Floor (Remove later)
      const gridHelper = new THREE.GridHelper(100, 100, 0xff0000, 0x444444);
      gridHelper.position.y = 0;
      scene.add(gridHelper);
      log("Temporary grid floor added for reference.");

      // 3. Lighting (Crucial now that we use MeshStandardMaterial!)
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // Brightened for debugging
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 10, 7.5);
      scene.add(dirLight);

      // 4. Setup Loaders with Draco
      const loader = new GLTFLoader();
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
      loader.setDRACOLoader(dracoLoader);

      const collidableObjects = []; // Important: Collision loop is now active below!

      // --- NEW DEBUG MATERIALS ---
      // Material for visible, grey objects (reacts to light)
      const visibleGreyMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x888888, 
        metalness: 0.2, 
        roughness: 0.8 
      });
      // Material for boundary walls (translucent red for visibility)
      const visibleBoundaryMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xff0000, 
        transparent: true, 
        opacity: 0.2 // Slightly visible red 
      });

      // List of all models to parse
      const modelsToLoad = [
        { name: 'Hexagon', path: 'https://raw.githack.com/pop161516/mataso-art/main/Modles/Hexagon.glb' },
        { name: 'ArtRoomTest2', path: 'https://raw.githack.com/pop161516/mataso-art/main/Modles/ArtRoomTest2.glb' },
        { name: 'SmallWalls3', path: 'https://raw.githack.com/pop161516/mataso-art/main/Modles/SmallWalls3.glb' }
      ];

      // Loop through and load every asset dynamically
      modelsToLoad.forEach((modelInfo) => {
        log(`Attempting to load: "${modelInfo.name}"...`);
        
        loader.load(
          modelInfo.path,
          function (gltf) {
            scene.add(gltf.scene);
            log(`✅ SUCCESS: ${modelInfo.name} loaded.`);

            gltf.scene.traverse((child) => {
              if (child.isMesh) {
                
                // --- MODEL RULE 1: Hexagon ---
                if (modelInfo.name === 'Hexagon') {
                  child.material = visibleGreyMaterial; // Change to shader-mat later
                  // No floor collision added here!
                }

                // --- MODEL RULE 2: ArtRoomTest2 ---
                if (modelInfo.name === 'ArtRoomTest2') {
                  // Make plinths/objects solid grey boundaries
                  if (!child.name.toLowerCase().includes('floor')) {
                    child.material = visibleGreyMaterial; // Grey color applied
                    collidableObjects.push(child); // Active Boundary!
                  } else {
                    // Make art room floor grey for now so you can see it
                    child.material = visibleGreyMaterial; 
                  }
                }

                // --- MODEL RULE 3: SmallWalls3 ---
                if (modelInfo.name === 'SmallWalls3') {
                  child.material = visibleBoundaryMaterial; // NOW RED AND VISIBLE
                  collidableObjects.push(child); // Acts as your boundary wall
                }
                
              }
            });
            log(`✅ SUCCESS: ${modelInfo.name} attributes mapped.`);
          },
          undefined,
          function (error) {
            log(`❌ ERROR: Could not read file "${modelInfo.name}". Check file naming syntax inside the /Modles/ folder.`, true);
            console.error(error);
          }
        );
      });

      // 5. Controls setup
      const controls = new PointerLockControls(camera, document.body);
      const blocker = document.getElementById('blocker');

      blocker.addEventListener('click', function () {
        controls.lock(); 
      });

      controls.addEventListener('lock', function () {
        blocker.style.display = 'none';
        log("Mouse locked. Test collisions!");
      });

      controls.addEventListener('unlock', function () {
        blocker.style.display = 'flex';
        log("Mouse unlocked.");
      });

      scene.add(controls.getObject());

      // 6. Movement Logic
      const keyboard = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };

      document.addEventListener('keydown', (e) => { 
        if (keyboard[e.code] !== undefined) keyboard[e.code] = true; 
      });
      document.addEventListener('keyup', (e) => { 
        if (keyboard[e.code] !== undefined) keyboard[e.code] = false; 
      });

      const velocity = new THREE.Vector3();
      const direction = new THREE.Vector3();
      const clock = new THREE.Clock();
      const moveSpeed = 40.0;

      // 7. Raycaster Setup for collisions
      const raycaster = new THREE.Raycaster();
      raycaster.near = 0;
      raycaster.far = 1.0; // Distance of the check in front/behind you

      // 8. Animation Loop with Bulletproof Sliding Fixes
      let lastLogTime = 0;

      function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        if (controls.isLocked === true) {
          velocity.x -= velocity.x * 10.0 * delta;
          velocity.z -= velocity.z * 10.0 * delta;

          direction.z = Number(keyboard.KeyS) - Number(keyboard.KeyW); 
          direction.x = Number(keyboard.KeyD) - Number(keyboard.KeyA);
          direction.normalize(); 

          if (keyboard.KeyW || keyboard.KeyS) velocity.z += direction.z * moveSpeed * delta;
          if (keyboard.KeyA || keyboard.KeyD) velocity.x += direction.x * moveSpeed * delta;

          const controlObject = controls.getObject();
          controlObject.position.y = 1.0; // Maintain waist height

          let canMoveZ = true;
          let canMoveX = true;
          let canMoveDiagonal = true; // New fallback guard

          if (collidableObjects.length > 0) {
            // Get camera directions
            const cameraDirection = new THREE.Vector3();
            controlObject.getWorldDirection(cameraDirection);
            cameraDirection.y = 0;
            cameraDirection.normalize();

            const cameraRight = new THREE.Vector3();
            cameraRight.crossVectors(cameraDirection, controlObject.up).normalize().negate();

            const rayOrigin = controlObject.position.clone();
            rayOrigin.y = 0.5; // Cast from low center

            // 1. Z Collision (Forward/Backward)
            if (velocity.z !== 0) {
              const rayDirZ = cameraDirection.clone().multiplyScalar(velocity.z < 0 ? 1 : -1);
              raycaster.set(rayOrigin, rayDirZ);
              raycaster.far = Math.abs(velocity.z * delta) + 1.2;

              const intersectionsZ = raycaster.intersectObjects(collidableObjects, true);
              if (intersectionsZ.length > 0) {
                canMoveZ = false;
                velocity.z = 0;
              }
            }

            // 2. X Collision (Left/Right)
            if (velocity.x !== 0) {
              const rayDirX = cameraRight.clone().multiplyScalar(velocity.x > 0 ? 1 : -1);
              raycaster.set(rayOrigin, rayDirX);
              raycaster.far = Math.abs(velocity.x * delta) + 1.2;

              const intersectionsX = raycaster.intersectObjects(collidableObjects, true);
              if (intersectionsX.length > 0) {
                canMoveX = false;
                velocity.x = 0;
              }
            }

            // 3. THE DIAGONAL SLIDE FIX: Look exactly where the player's total velocity is heading
            if ((velocity.x !== 0 || velocity.z !== 0) && (canMoveX && canMoveZ)) {
              // Calculate unified total heading vector
              const combinedHeading = new THREE.Vector3();
              
              // Project forward/backward movement vector
              const fwdVector = cameraDirection.clone().multiplyScalar(-velocity.z * delta);
              // Project left/right movement vector
              const sideVector = cameraRight.clone().multiplyScalar(velocity.x * delta);
              
              // Add them together to find the true trajectory path
              combinedHeading.addVectors(fwdVector, sideVector);
              const totalDistance = combinedHeading.length();
              combinedHeading.normalize();

              // Shoot a final predictive ray down your path of movement
              raycaster.set(rayOrigin, combinedHeading);
              raycaster.far = totalDistance + 1.2; // Extra padding boundary

              const intersectionsDiagonal = raycaster.intersectObjects(collidableObjects, true);
              if (intersectionsDiagonal.length > 0) {
                // If diagonal trajectory hits a corner edge, stop all movement immediately
                canMoveDiagonal = false;
                velocity.x = 0;
                velocity.z = 0;
                
                const hitObject = intersectionsDiagonal[0].object;
                log(`🛑 DIAGONAL BLOCK! Blocked clipping into corner of: "${hitObject.name}"`);
              }
            }
          }

          // Apply movement step safely only if all checks pass
          if (canMoveX && canMoveDiagonal) controls.moveRight(velocity.x * delta);
          if (canMoveZ && canMoveDiagonal) controls.moveForward(-velocity.z * delta); 
        }

        renderer.render(scene, camera);
      }

      animate();
      log("Engine running at 60fps.");

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
